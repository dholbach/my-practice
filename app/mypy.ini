[mypy]
# Django-specific settings
plugins = mypy_django_plugin.main

# General mypy settings
python_version = 3.14
warn_return_any = True
warn_unused_configs = True
# Start permissive, tighten over time
disallow_untyped_defs = False
disallow_any_generics = False
disallow_subclassing_any = False
disallow_incomplete_defs = False
check_untyped_defs = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True
strict_equality = True
show_error_codes = True
show_column_numbers = True

# Allow middleware-added attributes (set dynamically by PracticeScopeMiddleware)
disable_error_code = attr-defined

# Output formatting
pretty = True
color_output = True
error_summary = True

# Exclude patterns
exclude = (?x)(
    my_practice/migrations/
    | my_practice/management/commands/archive/
    | my_practice/tests/
    | scripts/archive/
    | venv/
    | \.venv/
  )

# Django-stubs plugin configuration
[mypy.plugins.django-stubs]
django_settings_module = config.settings

# Per-module options - gradually increase strictness
[mypy-my_practice.models.*]
disallow_untyped_defs = True

[mypy-my_practice.utils.calculations]
disallow_untyped_defs = True

[mypy-my_practice.utils.date_helpers]
disallow_untyped_defs = True

[mypy-my_practice.utils.invoice_helpers]
disallow_untyped_defs = True

[mypy-my_practice.utils.revenue_helpers]
disallow_untyped_defs = True

# Third-party libraries without stubs
[mypy-weasyprint.*]
ignore_missing_imports = True

[mypy-PIL.*]
ignore_missing_imports = True

[mypy-google.*]
ignore_missing_imports = True

[mypy-googleapiclient.*]
ignore_missing_imports = True

[mypy-google_auth_oauthlib.*]
ignore_missing_imports = True

[mypy-dateutil.*]
ignore_missing_imports = True
