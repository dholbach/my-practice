name: Build & push Docker image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          # workflow_dispatch: check out the requested tag
          # push (tag): github.event.inputs.tag is empty, falls back to github.ref
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Determine image tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./app
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/dholbach/my-practice:${{ steps.meta.outputs.tag }}
            ghcr.io/dholbach/my-practice:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
