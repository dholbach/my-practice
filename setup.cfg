[pycodestyle]
ignore = E501,W503
max-line-length = 100
exclude =
    .git,
    __pycache__,
    */migrations/*,
    .venv,
    venv,
    env

[vulture]
# Ignore Django framework patterns
exclude =
    */migrations/*,
    .venv,
    venv,
    env,
    __pycache__
# Minimum confidence to report (0-100)
# 80+ means more confidence = fewer false positives
min_confidence = 80
# Use whitelist for Django-specific patterns
paths = app,.vulture_whitelist.py
